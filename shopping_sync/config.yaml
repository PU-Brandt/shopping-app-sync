name: ShoppingSync Control
version: "0.1.0"
slug: shopping_sync_control
description: Home-Assistant control panel for an external ShoppingSync service
url: https://github.com/PU-Brandt/shopping-app-sync
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:playlist-sync
panel_title: ShoppingSync
options:
  external_host: ""
  external_port: 8095
  api_base_path: /api/v1
  api_token: ""
  request_timeout_seconds: 10
schema:
  external_host: str
  external_port: port
  api_base_path: str
  api_token: password
  request_timeout_seconds: int(1,120)
